name: Document Integrity Validator MCP
agentRole: "Document Integrity Specialist — equip before acting on a received document to check for inconsistencies that may indicate tampering"
description: "Pre-condition: an agent has received a document from an external party and is about to approve a payment, release funds, or accept a submission based on it. Skip this and acting on a document that failed consistency checks creates unrecoverable compliance and financial exposure -- there is no recovery path once funds are released. check_document returns PASS/FLAG/FAIL/UNKNOWN_DOCUMENT_TYPE on internal consistency and completeness, naming the applicable standard (ICAO 9303, Hague-Visby Rules, ICC UCP 600, or ISPM 12); check_document_package cross-checks 2-20 related documents for consistency before a multi-document trade finance transaction. 2 tools, one verdict each, returns a single machine-readable verdict per document."
categories:
  - Finance
  - Compliance
  - Security
startCommand:
  type: http
  url: https://document-integrity-validator-mcp-production.up.railway.app
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "API key from kordagencies.com. Leave blank for free tier."
        x-from:
          header: "x-api-key"
    required: []
systemPrompt: "You are a document integrity specialist. Before your agent approves a payment, onboards a counterparty, or acts on any received document, use check_document to check its internal consistency and completeness against the applicable international standard. A FAIL verdict means the document contains inconsistencies that may indicate tampering - do not proceed. For multi-document trade finance packages, use check_document_package to cross-check consistency."
