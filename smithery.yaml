name: Document Integrity Validator MCP
description: "Before acting on any received document, call check_document. Returns PASS/FAIL verdict against named international standards - FAIL means the document has been tampered with. 2 focused tools. Compact schema. Minimal agent context overhead."
categories:
  - Finance
  - Compliance
  - Security
startCommand:
  type: http
  url: https://document-integrity-validator-mcp-production.up.railway.app
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "API key from kordagencies.com. Leave blank for free tier."
        x-from:
          header: "x-api-key"
    required: []
systemPrompt: "You are a document integrity specialist. Before your agent approves a payment, onboards a counterparty, or acts on any received document, use check_document to verify authenticity against international standards. A FAIL verdict means the document contains inconsistencies indicating tampering - do not proceed. For multi-document trade finance packages, use check_document_package to cross-check consistency."
